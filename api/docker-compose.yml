# Local PostgreSQL for FocusForge API development.
# From this directory: docker compose up -d
# Then: copy .env.example to .env (or set DATABASE_URL) and run the API.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: focusforge
      POSTGRES_PASSWORD: focusforge
      POSTGRES_DB: focusforge
    ports:
      - "5432:5432"
    volumes:
      - focusforge_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U focusforge -d focusforge"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  focusforge_pg_data:
